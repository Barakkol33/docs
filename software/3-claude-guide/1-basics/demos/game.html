<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Dodge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  canvas {
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(99, 102, 241, 0.3);
  }
  #ui {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #e0e7ff;
    pointer-events: none;
  }
  #ui.hidden { display: none; }
  #ui h1 {
    font-size: 48px;
    font-weight: 700;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  #ui p {
    font-size: 18px;
    color: #94a3b8;
    margin-bottom: 24px;
  }
  #ui .start-hint {
    font-size: 16px;
    color: #6366f1;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  #score-display {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    font-weight: 600;
    color: #c4b5fd;
    font-family: 'Segoe UI', sans-serif;
    text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
  }
  #score-display.hidden { display: none; }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="score-display" class="hidden"></div>
<div id="ui">
  <h1>Space Dodge</h1>
  <p>Dodge the asteroids. Collect stars. Survive.</p>
  <div class="start-hint">Click or press Space to start</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const scoreEl = document.getElementById('score-display');

const W = 480, H = 640;
canvas.width = W;
canvas.height = H;

let state = 'menu'; // menu | playing | dead
let score = 0;
let highScore = 0;
let ship = { x: W / 2, y: H - 80, w: 24, h: 28, targetX: W / 2 };
let asteroids = [];
let stars = [];
let particles = [];
let bgStars = [];
let time = 0;
let shakeTime = 0;
let trail = [];

// Background stars
for (let i = 0; i < 80; i++) {
  bgStars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: Math.random() * 1.5 + 0.5,
    speed: Math.random() * 0.5 + 0.2,
    brightness: Math.random() * 0.5 + 0.3
  });
}

function spawnAsteroid() {
  const size = Math.random() * 20 + 12;
  asteroids.push({
    x: Math.random() * (W - size * 2) + size,
    y: -size,
    size,
    speed: Math.random() * 2 + 1.5 + score * 0.005,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.05,
    vertices: generateAsteroidShape(size)
  });
}

function generateAsteroidShape(size) {
  const points = [];
  const n = 8 + Math.floor(Math.random() * 4);
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2;
    const r = size * (0.7 + Math.random() * 0.3);
    points.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
  }
  return points;
}

function spawnStar() {
  stars.push({
    x: Math.random() * (W - 40) + 20,
    y: -10,
    speed: Math.random() * 1 + 1,
    pulse: Math.random() * Math.PI * 2
  });
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.03 + 0.015,
      size: Math.random() * 3 + 1,
      color
    });
  }
}

function reset() {
  ship.x = W / 2;
  ship.y = H - 80;
  ship.targetX = W / 2;
  asteroids = [];
  stars = [];
  particles = [];
  trail = [];
  score = 0;
  time = 0;
}

// Input
let mouseX = W / 2;
let useKeys = false;
let keys = {};

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / (rect.width / W);
  useKeys = false;
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) / (rect.width / W);
  useKeys = false;
}, { passive: false });

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') useKeys = true;
  if ((e.key === ' ' || e.key === 'Enter') && state !== 'playing') startGame();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('click', () => { if (state !== 'playing') startGame(); });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state !== 'playing') startGame();
}, { passive: false });

function startGame() {
  if (state === 'playing') return;
  reset();
  state = 'playing';
  ui.classList.add('hidden');
  scoreEl.classList.remove('hidden');
}

function drawShip(x, y, tilt) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt * 0.15);

  // Engine glow
  const glowSize = 8 + Math.sin(time * 0.3) * 3;
  const grd = ctx.createRadialGradient(0, 16, 0, 0, 16, glowSize);
  grd.addColorStop(0, 'rgba(139, 92, 246, 0.8)');
  grd.addColorStop(0.5, 'rgba(99, 102, 241, 0.3)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(-glowSize, 12, glowSize * 2, glowSize * 2);

  // Ship body
  ctx.beginPath();
  ctx.moveTo(0, -14);
  ctx.lineTo(-11, 14);
  ctx.lineTo(-4, 10);
  ctx.lineTo(0, 16);
  ctx.lineTo(4, 10);
  ctx.lineTo(11, 14);
  ctx.closePath();

  const shipGrd = ctx.createLinearGradient(0, -14, 0, 16);
  shipGrd.addColorStop(0, '#c4b5fd');
  shipGrd.addColorStop(1, '#6366f1');
  ctx.fillStyle = shipGrd;
  ctx.fill();

  ctx.strokeStyle = '#e0e7ff';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rotation);
  ctx.beginPath();
  ctx.moveTo(a.vertices[0].x, a.vertices[0].y);
  for (let i = 1; i < a.vertices.length; i++) {
    ctx.lineTo(a.vertices[i].x, a.vertices[i].y);
  }
  ctx.closePath();
  ctx.fillStyle = '#374151';
  ctx.fill();
  ctx.strokeStyle = '#6b7280';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function drawStar(s) {
  const glow = 0.6 + Math.sin(s.pulse) * 0.4;
  ctx.save();
  ctx.translate(s.x, s.y);

  // Glow
  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, 14);
  g.addColorStop(0, `rgba(250, 204, 21, ${0.3 * glow})`);
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(-14, -14, 28, 28);

  // Star shape
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](Math.cos(angle) * 7, Math.sin(angle) * 7);
  }
  ctx.closePath();
  ctx.fillStyle = `rgba(250, 204, 21, ${glow})`;
  ctx.fill();
  ctx.restore();
}

function update() {
  time++;

  if (state !== 'playing') return;

  // Ship movement
  if (useKeys) {
    if (keys['ArrowLeft']) ship.targetX -= 5;
    if (keys['ArrowRight']) ship.targetX += 5;
  } else {
    ship.targetX = mouseX;
  }
  ship.targetX = Math.max(14, Math.min(W - 14, ship.targetX));
  const dx = ship.targetX - ship.x;
  ship.x += dx * 0.12;

  // Trail
  trail.push({ x: ship.x, y: ship.y + 16, life: 1 });
  if (trail.length > 15) trail.shift();

  // Spawn
  if (time % Math.max(15, 35 - Math.floor(score / 50)) === 0) spawnAsteroid();
  if (time % 90 === 0) spawnStar();

  // Update asteroids
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.y += a.speed;
    a.rotation += a.rotSpeed;
    if (a.y > H + a.size) { asteroids.splice(i, 1); continue; }

    // Collision with ship
    const dist = Math.hypot(a.x - ship.x, a.y - ship.y);
    if (dist < a.size + 10) {
      spawnParticles(ship.x, ship.y, '#f87171', 30);
      spawnParticles(ship.x, ship.y, '#c4b5fd', 20);
      shakeTime = 15;
      if (score > highScore) highScore = score;
      state = 'dead';
      setTimeout(() => {
        ui.innerHTML = `
          <h1>Game Over</h1>
          <p>Score: ${score} ${score >= highScore && highScore > 0 ? '(New High Score!)' : ''}<br>
          <span style="font-size:14px;color:#64748b">Best: ${highScore}</span></p>
          <div class="start-hint">Click or press Space to retry</div>
        `;
        ui.classList.remove('hidden');
        scoreEl.classList.add('hidden');
      }, 600);
    }
  }

  // Update stars
  for (let i = stars.length - 1; i >= 0; i--) {
    const s = stars[i];
    s.y += s.speed;
    s.pulse += 0.08;
    if (s.y > H + 10) { stars.splice(i, 1); continue; }

    const dist = Math.hypot(s.x - ship.x, s.y - ship.y);
    if (dist < 20) {
      score += 10;
      spawnParticles(s.x, s.y, '#fbbf24', 12);
      stars.splice(i, 1);
    }
  }

  // Score ticks up
  if (time % 6 === 0) score++;

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Trail fade
  for (const t of trail) t.life -= 0.07;
}

function draw() {
  // Screen shake
  let sx = 0, sy = 0;
  if (shakeTime > 0) {
    sx = (Math.random() - 0.5) * shakeTime * 0.8;
    sy = (Math.random() - 0.5) * shakeTime * 0.8;
    shakeTime--;
  }

  ctx.save();
  ctx.translate(sx, sy);

  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Background stars
  for (const s of bgStars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    const flicker = s.brightness + Math.sin(time * 0.02 + s.x) * 0.15;
    ctx.fillStyle = `rgba(148, 163, 184, ${flicker})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }

  // Trail
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    if (t.life <= 0) continue;
    ctx.fillStyle = `rgba(139, 92, 246, ${t.life * 0.4})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.life * 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stars (collectibles)
  for (const s of stars) drawStar(s);

  // Asteroids
  for (const a of asteroids) drawAsteroid(a);

  // Ship
  if (state === 'playing') {
    const tilt = (ship.targetX - ship.x) * 0.05;
    drawShip(ship.x, ship.y, tilt);
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // Score
  if (state === 'playing') {
    scoreEl.textContent = `Score: ${score}`;
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
